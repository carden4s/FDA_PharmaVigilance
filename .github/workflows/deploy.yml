name: Deploy

on:
  push:
    branches: [main]
    tags:
      - 'v*'

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v3
    
    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v2
    
    - name: Login to Docker Registry
      uses: docker/login-action@v2
      with:
        registry: ${{ secrets.REGISTRY }}
        username: ${{ secrets.REGISTRY_USERNAME }}
        password: ${{ secrets.REGISTRY_PASSWORD }}
    
    - name: Build and push Ingestion
      uses: docker/build-push-action@v4
      with:
        context: .
        file: ./Dockerfile.ingestion
        push: true
        tags: |
          ${{ secrets.REGISTRY }}/pharma-ingestion:latest
          ${{ secrets.REGISTRY }}/pharma-ingestion:${{ github.sha }}
    
    - name: Build and push Streamlit
      uses: docker/build-push-action@v4
      with:
        context: .
        file: ./Dockerfile.streamlit
        push: true
        tags: |
          ${{ secrets.REGISTRY }}/pharma-dashboard:latest
          ${{ secrets.REGISTRY }}/pharma-dashboard:${{ github.sha }}
    
    - name: Build and push dbt
      uses: docker/build-push-action@v4
      with:
        context: .
        file: ./Dockerfile.dbt
        push: true
        tags: |
          ${{ secrets.REGISTRY }}/pharma-dbt:latest
          ${{ secrets.REGISTRY }}/pharma-dbt:${{ github.sha }}

  deploy-aws:
    needs: build-and-push
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v3
    
    - name: Configure AWS credentials
      uses: aws-actions/configure-aws-credentials@v2
      with:
        role-to-assume: ${{ secrets.AWS_ROLE }}
        aws-region: us-east-1
    
    - name: Deploy to ECS
      run: |
        aws ecs update-service \
          --cluster pharma-cluster \
          --service pharma-service \
          --force-new-deployment
    
    - name: Notify deployment
      run: |
        echo "Deployment completed successfully"
