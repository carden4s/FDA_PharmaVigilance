name: Tests

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  test-ingestion:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v3
    
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r ingestion/requirements-dev.txt
    
    - name: Lint with flake8
      run: |
        flake8 ingestion/src --count --select=E9,F63,F7,F82 --show-source --statistics
        flake8 ingestion/src --count --exit-zero --max-complexity=10 --max-line-length=127 --statistics
    
    - name: Run tests with pytest
      run: |
        cd ingestion
        pytest tests/ -v --cov=src --cov-report=xml
    
    - name: Upload coverage
      uses: codecov/codecov-action@v3
      with:
        files: ./ingestion/coverage.xml
        fail_ci_if_error: false

  test-dbt:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v3
    
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r dbt/requirements.txt
    
    - name: dbt parse
      run: |
        cd dbt
        dbt parse --profiles-dir ~/.dbt
      env:
        SNOWFLAKE_ACCOUNT: "dummy"
        SNOWFLAKE_USER: "dummy"
        SNOWFLAKE_PASSWORD: "dummy"

  lint:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v3
    
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'
    
    - name: Format check with black
      run: |
        pip install black
        black --check ingestion/src streamlit/
      continue-on-error: true
