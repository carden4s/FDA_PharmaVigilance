version: 2

models:
  - name: stg_fda_adverse_events
    description: Cleaned and standardized FDA adverse events
    tests:
      - dbt_utils.expression_is_true:
          expression: "patient_age IS NULL OR (patient_age >= 0 AND patient_age <= 150)"
    columns:
      - name: event_id
        description: Unique event identifier (MD5 hash of report + drug + reaction)
        tests:
          - unique
          - not_null
      - name: report_id
        description: FDA safety report ID
        tests:
          - not_null
      - name: drug_name
        description: Drug name (standardized, uppercase)
        tests:
          - not_null
      - name: reaction_name
        description: Adverse reaction name
      - name: patient_age
        description: Patient age in years (0-150)
      - name: patient_sex
        description: Patient sex (Male, Female, Unknown)
        tests:
          - accepted_values:
              values: ['Male', 'Female', 'Unknown']
      - name: is_fatal
        description: Whether death was reported
      - name: is_serious
        description: Whether event was serious
      - name: event_date
        description: Date adverse event occurred
      - name: reaction_outcome
        description: Outcome of reaction (Fatal, Serious, Hospitalized, etc.)