version: 2

sources:
  - name: bronze
    description: Raw FDA adverse events data
    database: "{{ env_var('SNOWFLAKE_DATABASE', 'FARMACEUTICADATA') }}"
    schema: "{{ env_var('SNOWFLAKE_SCHEMA', 'FDA_EXPERIENCE') }}"
    tables:
      - name: raw_fda_adverse_events
        description: Unprocessed adverse events directly from FDA API
        loaded_at_field: loaded_at
        freshness:
          warn_after: {count: 2, period: day}
          error_after: {count: 7, period: day}
        columns:
          - name: safetyreportid
            description: Unique FDA adverse event report identifier
            tests:
              - not_null
          - name: drug_name
            description: Name of suspect drug
          - name: patient_onsetage
            description: Patient age at symptom onset (value; unit in patient_onsetage_unit)
          - name: patient_onsetage_unit
            description: openFDA age unit code (800=decade, 801=year, 802=month, 803=week, 804=day, 805=hour)
          - name: reaction_name
            description: Adverse reaction term