version: 2

models:
  - name: fct_adverse_events
    description: Fact table for adverse events
    columns:
      - name: fact_id
        description: Unique fact identifier
        tests:
          - unique
          - not_null
      - name: event_id
        description: Reference to event
        tests:
          - not_null

  - name: agg_reaction_frequency
    description: Top reactions per drug
    tests:
      - dbt_utils.expression_is_true:
          expression: "reaction_frequency_pct >= 0 AND reaction_frequency_pct <= 100"
    columns:
      - name: drug_name
        tests:
          - not_null

  - name: agg_drug_safety_profile
    description: Safety metrics per drug
    tests:
      - dbt_utils.expression_is_true:
          expression: "serious_rate_pct >= 0 AND serious_rate_pct <= 100"
    columns:
      - name: drug_name
        tests:
          - unique
          - not_null

  - name: agg_patient_demographics
    description: Patient demographics per drug
    columns:
      - name: drug_name
        tests:
          - not_null

  - name: agg_polypharmacy_signals
    description: Multi-drug signals
    columns:
      - name: drug_1_name
        tests:
          - not_null
      - name: drug_2_name
        tests:
          - not_null

  - name: agg_disproportionality
    description: PRR/ROR disproportionality signals per drug-reaction pair
    tests:
      - dbt_utils.expression_is_true:
          expression: "prr >= 0"
      - dbt_utils.expression_is_true:
          expression: "ror >= 0"
    columns:
      - name: drug_name
        tests:
          - not_null
      - name: reaction_name
        tests:
          - not_null
      - name: chi_square
        tests:
          - dbt_utils.expression_is_true:
              expression: "chi_square >= 0"